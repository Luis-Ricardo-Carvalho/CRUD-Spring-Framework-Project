<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{cabecalho :: head}"></div>
    <title>Crud Manager - Formulário Empresa</title>
</head>
<body>
    <div class="container my-4">
        <h2>Cadastro de Empresa</h2>
        <form th:action="@{/empresas/save}" method="POST" th:object="${empresa}">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group col-6">
                <label>Nome:</label>
                <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                <input type="text" class="form-control" th:field="*{name}"> 
            </div>
            
            <div class="form-group col-6">
                <label>CNPJ:</label>
                <span class="text-danger" th:if="${#fields.hasErrors('cnpj')}" th:errors="*{cnpj}"></span>
                <input type="text" class="form-control" th:field="*{cnpj}">
            </div>
            
            <div class="form-group col-6">
                <label>Setor Industrial:</label>
                <span class="text-danger" th:if="${#fields.hasErrors('industry')}" th:errors="*{industry}"></span>
                <input type="text" class="form-control" th:field="*{industry}">
            </div>
               
            <div class="form-group col-6">
                <label>Telefone:</label>
                <span class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                <input type="text" class="form-control" th:field="*{phone}">
            </div>
            
            <button type="submit" class="btn btn-info ml-3">Salvar</button>
        </form>
        <hr>
        <a th:href="@{/empresas}">Voltar para Empresas</a>
    </div>
</body>
</html>
