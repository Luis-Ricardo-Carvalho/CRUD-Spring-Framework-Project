<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crud Manager - Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f5f5f5; display: flex; align-items: center; height: 100vh; justify-content: center; }
        .form-signin { width: 100%; max-width: 330px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <main class="form-signin text-center">
        <form th:action="@{/login}" method="POST">
            <h1 class="h3 mb-3 font-weight-normal">CRUD Manager</h1>
            <p class="mb-4 text-muted">Por favor, faça o login</p>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Usuário ou senha inválidos!
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                Você saiu com sucesso!
            </div>

            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder="Usuário" required autofocus>
            </div>
            
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Senha" required>
            </div>

            <button class="btn btn-lg btn-primary btn-block" type="submit">Entrar</button>
        </form>
    </main>
</body>
</html>
